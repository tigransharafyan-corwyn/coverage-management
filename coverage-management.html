<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coverage Management — Betting Backoffice</title>
<style>
  :root {
    --bg: #f4f6f9;
    --panel: #ffffff;
    --border: #e3e8ef;
    --border-strong: #cdd5e0;
    --text: #1d2733;
    --muted: #69788c;
    --accent: #2f6df6;
    --accent-soft: #eaf1ff;
    --pos: #12824a;
    --neg: #d23f3f;
    --warn: #b7791f;
    --warn-soft: #fdf3e2;
    --live: #0ca678;        /* live channel */
    --live-soft: #e3faf3;
    --prematch: #2f6df6;    /* prematch channel */
    --prematch-soft: #eaf1ff;
    --row-hover: #f7f9fc;
    --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);
    --shadow-lg: 0 12px 40px rgba(16,24,40,.20);
    --radius: 10px;
    --depth-tint: #f0f4fa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 13px; -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 1640px; margin: 0 auto; padding: 18px 22px 40px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px;}
  .topbar h1 { font-size: 20px; margin: 0; font-weight: 650; letter-spacing:-.2px;}
  .topbar .sub { color: var(--muted); font-size: 12px; margin-top:3px;}
  .topbar-right { display:flex; align-items:center; gap:14px; flex-wrap:wrap;}

  .ctx-field { display:flex; flex-direction:column; gap:4px; }
  .ctx-field label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px;}
  select.input, input.input {
    border:1px solid var(--border-strong); background:#fff; border-radius:8px; padding:8px 10px; font-size:12.5px;
    color:var(--text); font-family:inherit; min-height:34px;
  }
  select.input:focus, input.input:focus { outline:none; border-color:var(--accent); }

  .kpis { display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; margin-bottom:16px; }
  .kpi { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow);}
  .kpi .label { color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; font-weight:600;}
  .kpi .value { font-size:19px; font-weight:650; margin-top:5px; letter-spacing:-.3px;}
  .kpi .value.pos { color:var(--pos);} .kpi .value.neg { color:var(--neg);} .kpi .value.live{color:var(--live);} .kpi .value.pre{color:var(--prematch);}

  .panel { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px;}
  .panel-head { padding:11px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .panel-head h2 { font-size:13px; margin:0; font-weight:650; }
  .panel-head .hint { color:var(--muted); font-size:11px; font-weight:400;}
  .panel-body { padding:14px; }
  .spacer { flex:1; }

  /* shell: left tree + main */
  .cov-shell { display:grid; grid-template-columns: 296px 1fr; gap:16px; align-items:start; }
  @media (max-width:1100px){ .cov-shell{ grid-template-columns:1fr; } }

  /* ---------- left iframe tree ---------- */
  .sidebar { position:sticky; top:14px; }
  .side-block { border-bottom:1px solid var(--border); }
  .side-block:last-child { border-bottom:none; }
  .side-title { display:flex; align-items:center; gap:8px; padding:10px 14px; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
  .side-title .count { margin-left:auto; background:var(--accent-soft); color:var(--accent); border-radius:999px; padding:1px 7px; font-size:10px; font-weight:700;}
  .side-add { margin-left:auto; border:1px dashed var(--border-strong); background:#fff; border-radius:7px; width:22px; height:22px; cursor:pointer; color:var(--muted); font-weight:700; line-height:1; padding:0;}
  .side-add:hover{ border-color:var(--accent); color:var(--accent);}
  .pin-item, .nav-item { display:flex; align-items:center; gap:8px; padding:8px 14px; cursor:pointer; font-size:12.5px; border-left:3px solid transparent;}
  .pin-item:hover, .nav-item:hover { background:var(--row-hover); }
  .nav-item.active { background:var(--accent-soft); border-left-color:var(--accent); color:var(--accent); font-weight:600;}
  .pin-item .ic, .nav-item .ic { width:16px; text-align:center; flex-shrink:0;}
  .pin-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pin-item .x { color:var(--muted); opacity:.5; font-weight:700; }
  .pin-item:hover .x { opacity:1; }
  .pin-item .x:hover { color:var(--neg); }
  .nav-item .badge { margin-left:auto; background:#eef2f7; color:var(--muted); border-radius:999px; padding:1px 7px; font-size:10px; font-weight:700;}

  .stree { padding:4px 0 8px; max-height:340px; overflow:auto; }
  .snode { font-size:12.5px; }
  .srow { display:flex; align-items:center; gap:6px; padding:5px 12px; cursor:pointer; border-left:3px solid transparent;}
  .srow:hover { background:var(--row-hover);}
  .srow.sel { background:var(--accent-soft); border-left-color:var(--accent);}
  .srow .tw { width:14px; height:14px; display:inline-flex; align-items:center; justify-content:center; color:var(--muted); transition:transform .12s; flex-shrink:0;}
  .srow .tw.open { transform:rotate(90deg);} .srow .tw.leaf{ visibility:hidden;}
  .srow .ic { width:15px; text-align:center; flex-shrink:0; }
  .srow .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .srow .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .dot.both{ background:var(--pos);} .dot.partial{ background:var(--warn);} .dot.off{ background:var(--neg);}

  /* ---------- toolbar ---------- */
  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn { border:1px solid var(--border-strong); background:#fff; border-radius:8px; padding:7px 12px; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--text); display:inline-flex; align-items:center; gap:6px;}
  .btn:hover { border-color:var(--accent); color:var(--accent);}
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:hover { filter:brightness(1.05); color:#fff; }
  .btn.danger { color:var(--neg); }
  .btn.danger:hover { border-color:var(--neg); background:#fdecec;}
  .btn.sm { padding:4px 9px; font-size:11.5px; }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .search-box { border:1px solid var(--border-strong); border-radius:8px; padding:8px 10px; font-size:12.5px; max-width:240px; width:240px;}

  .chip { display:inline-flex; align-items:center; gap:7px; padding:6px 11px; border:1px solid var(--border-strong);
    border-radius:999px; cursor:pointer; user-select:none; background:#fff; font-size:12px; font-weight:550; transition:.12s; }
  .chip:hover { border-color:var(--accent); }
  .chip.on { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

  /* segmented mode control */
  .seg { display:inline-flex; border:1px solid var(--border-strong); border-radius:8px; overflow:hidden; }
  .seg button { border:none; background:#fff; padding:7px 13px; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); border-right:1px solid var(--border-strong);}
  .seg button:last-child { border-right:none;}
  .seg button.on { color:#fff; }
  .seg button.on[data-mode="both"]{ background:var(--text);}
  .seg button.on[data-mode="live"]{ background:var(--live);}
  .seg button.on[data-mode="prematch"]{ background:var(--prematch);}

  /* selection bar */
  .selbar { display:flex; align-items:center; gap:10px; padding:9px 14px; background:var(--accent-soft); border:1px solid var(--accent); border-radius:8px; margin-bottom:12px; flex-wrap:wrap;}
  .selbar .lead { font-weight:650; color:var(--accent); }

  /* ---------- main coverage table ---------- */
  .table-wrap { overflow:auto; }
  table.cov { border-collapse:collapse; width:100%; font-size:12.5px; }
  table.cov thead th {
    position:sticky; top:0; z-index:5; background:#f8fafc; text-align:center; padding:10px 10px; font-weight:650; color:var(--muted);
    border-bottom:1px solid var(--border-strong); font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap;
  }
  table.cov thead th.lbl { text-align:left; }
  table.cov tbody td { padding:0; border-bottom:1px solid var(--border); text-align:center; white-space:nowrap; vertical-align:middle;}
  table.cov tbody td .cell { padding:7px 10px; }
  table.cov tbody tr:hover { background:var(--row-hover); }
  table.cov td.lbl { text-align:left; }
  td.lbl .cell { display:flex; align-items:center; gap:7px; }
  .twisty { width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); flex-shrink:0; transition:transform .12s; border-radius:4px;}
  .twisty:hover { background:var(--border); color:var(--text);}
  .twisty.open { transform:rotate(90deg); }
  .twisty.leaf { visibility:hidden; }
  .dim-tag { font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); background:#eef2f7; border-radius:4px; padding:1px 5px; font-weight:700; flex-shrink:0;}
  .dim-tag.SPT{ background:#e7f0ff; color:#2f6df6;}
  .dim-tag.CAT{ background:#eef7ec; color:#3a8a3a;}
  .dim-tag.TRN{ background:#fdf3e2; color:#b7791f;}
  .dim-tag.EVT{ background:#f3eefb; color:#7c4dd6;}
  .dim-tag.MKT{ background:#fbeef3; color:#c43d7a;}
  .name { font-weight:550; }
  .name.dis { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--border-strong);}
  .rowtag { font-size:10px; padding:1px 6px; border-radius:5px; font-weight:700; }
  .rowtag.flag { background:#eef2f7; color:var(--muted); }
  .sub-muted { color:var(--muted); font-size:11px;}
  .cb-sel { width:14px; height:14px; accent-color:var(--accent); cursor:pointer;}

  /* toggle switch */
  .sw { position:relative; display:inline-flex; align-items:center; gap:7px; cursor:pointer; user-select:none;}
  .sw .track { width:34px; height:19px; border-radius:999px; background:var(--border-strong); position:relative; transition:.15s; flex-shrink:0;}
  .sw .track:after { content:""; position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%; background:#fff; transition:.15s; box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .sw.on[data-ch="live"] .track { background:var(--live);}
  .sw.on[data-ch="prematch"] .track { background:var(--prematch);}
  .sw.on .track:after { left:17px; }
  .sw.inherited-off .track { background:#f0c7c7; }
  .sw.disabled { opacity:.5; cursor:not-allowed;}
  .ch-cell { display:flex; flex-direction:column; align-items:center; gap:3px;}
  .inh-note { font-size:9.5px; color:var(--neg); font-weight:600;}
  .inh-note.ok { color:var(--muted); }

  /* order control */
  .ord { display:inline-flex; align-items:center; gap:2px; }
  .ord .num { font-variant-numeric:tabular-nums; font-weight:700; min-width:20px; text-align:center;}
  .ord button { border:1px solid var(--border); background:#fff; width:20px; height:20px; border-radius:5px; cursor:pointer; color:var(--muted); padding:0; line-height:1; font-size:11px;}
  .ord button:hover:not(:disabled){ border-color:var(--accent); color:var(--accent);}
  .ord button:disabled{ opacity:.3; cursor:not-allowed;}

  /* small inline badges */
  .pbadge { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:#fff;}
  .pbadge:hover{ border-color:var(--accent);}
  .pbadge .prio { background:var(--accent); color:#fff; border-radius:4px; padding:0 5px; font-size:9.5px; font-weight:700;}
  .tmpl-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border);}
  .tmpl-badge.set{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .tmpl-badge.none{ background:#fff; color:var(--muted);}
  .tmpl-badge:hover{ border-color:var(--accent);}
  .age-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; background:#eef2f7; color:var(--muted); cursor:pointer; border:1px solid transparent;}
  .age-badge:hover{ border-color:var(--accent);}
  .mkt-link { font-size:11px; font-weight:600; color:var(--accent); cursor:pointer; }
  .mkt-link:hover { text-decoration:underline;}
  .mkt-link .warnnum{ color:var(--neg);}
  .icon-btn { border:1px solid var(--border); background:#fff; border-radius:6px; width:26px; height:26px; cursor:pointer; color:var(--muted); padding:0; display:inline-flex; align-items:center; justify-content:center;}
  .icon-btn:hover { border-color:var(--accent); color:var(--accent);}

  .legend { color:var(--muted); font-size:11px; padding:9px 14px; border-top:1px solid var(--border); display:flex; gap:18px; flex-wrap:wrap; align-items:center;}
  .legend .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px;}
  .empty-state { padding:48px; text-align:center; color:var(--muted); }
  .footer-note { color:var(--muted); font-size:11px; text-align:center; margin-top:8px;}

  /* ---------- modal ---------- */
  .overlay { position:fixed; inset:0; background:rgba(16,24,40,.45); z-index:100; display:flex; align-items:flex-start; justify-content:center; padding:48px 16px; overflow:auto;}
  .modal { background:#fff; border-radius:14px; box-shadow:var(--shadow-lg); width:100%; max-width:760px; overflow:hidden; animation:pop .12s ease-out;}
  .modal.wide { max-width:980px; }
  @keyframes pop { from{ transform:translateY(8px); opacity:.6;} to{ transform:none; opacity:1;} }
  .modal-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:12px;}
  .modal-head h3 { margin:0; font-size:16px; font-weight:650;}
  .modal-head .mh-sub { color:var(--muted); font-size:12px; margin-top:3px;}
  .modal-head .x { margin-left:auto; cursor:pointer; color:var(--muted); font-size:22px; line-height:1; border:none; background:none; padding:0;}
  .modal-head .x:hover { color:var(--text);}
  .modal-body { padding:18px 20px; max-height:62vh; overflow:auto;}
  .modal-foot { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; align-items:center;}

  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin:-4px 0 16px;}
  .tabs button { border:none; background:none; padding:9px 12px; font-size:12.5px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;}
  .tabs button.on { color:var(--accent); border-bottom-color:var(--accent);}

  table.grid { border-collapse:collapse; width:100%; font-size:12.5px;}
  table.grid th { text-align:left; padding:8px 10px; font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); border-bottom:1px solid var(--border-strong); font-weight:650;}
  table.grid th.c { text-align:center;}
  table.grid td { padding:7px 10px; border-bottom:1px solid var(--border); text-align:left; vertical-align:middle;}
  table.grid td.c { text-align:center;}
  table.grid tr:hover { background:var(--row-hover);}
  .eff-badge { font-size:10px; font-weight:700; padding:1px 7px; border-radius:5px;}
  .eff-on{ background:var(--live-soft); color:var(--live);}
  .eff-off{ background:#fdecec; color:var(--neg);}
  .eff-inh{ background:#eef2f7; color:var(--muted);}
  .eff-exc{ background:var(--warn-soft); color:var(--warn);}

  .prov-row { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--border); border-radius:9px; margin-bottom:8px; background:#fff;}
  .prov-row .grab { color:var(--muted); cursor:grab; }
  .prov-row .pnum { width:22px; height:22px; border-radius:6px; background:var(--accent); color:#fff; font-weight:700; display:inline-flex; align-items:center; justify-content:center; font-size:11px;}
  .prov-row .pname { font-weight:600; flex:1;}
  .prov-row .pmeta { color:var(--muted); font-size:11px;}

  .tmpl-card { border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
  .tmpl-card.applied { border-color:var(--accent); background:var(--accent-soft);}
  .tmpl-card .tc-head { display:flex; align-items:center; gap:10px; }
  .tmpl-card .tc-name { font-weight:650; font-size:13.5px;}
  .tmpl-card .tc-meta { color:var(--muted); font-size:11.5px; margin-top:2px;}
  .mkt-pill { display:inline-block; font-size:10.5px; padding:2px 7px; border-radius:5px; background:#eef2f7; color:var(--text); margin:2px 3px 0 0;}

  .info-banner { background:var(--warn-soft); border:1px solid #f0d9a8; color:#8a5a12; border-radius:8px; padding:9px 12px; font-size:12px; margin-bottom:14px; display:flex; gap:8px; align-items:flex-start;}
  .info-banner.blue{ background:var(--accent-soft); border-color:#bcd2fb; color:#2453b8;}

  .summary-grp { margin-bottom:18px; }
  .summary-grp h4 { margin:0 0 8px; font-size:12.5px; }
  .summary-item { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:7px; font-size:12px;}
  .summary-item:nth-child(even){ background:var(--row-hover);}
  .ppath { color:var(--muted); }
  .pillrow { display:flex; gap:6px; flex-wrap:wrap; }
  label.fld { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; margin-bottom:5px;}
  .checkline { display:flex; align-items:center; gap:8px; padding:6px 4px; font-size:12.5px;}
  .checkline input { accent-color:var(--accent); width:15px; height:15px;}

  .pe-card { display:flex; align-items:center; gap:12px; padding:11px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:9px;}
  .pe-card .pe-when { font-size:11px; color:var(--muted); }
  .pe-card .pe-name { font-weight:650; }
  .pe-card .pe-path { font-size:11px; color:var(--muted);}
  .live-pill { font-size:9.5px; font-weight:700; padding:1px 6px; border-radius:4px; background:var(--live-soft); color:var(--live); text-transform:uppercase; letter-spacing:.3px;}
  .views { display:flex; gap:4px; }
  .views button { border:1px solid var(--border-strong); background:#fff; padding:7px 13px; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--muted);}
  .views button:first-child{ border-radius:8px 0 0 8px;}
  .views button:last-child{ border-radius:0 8px 8px 0; border-left:none;}
  .views button.on{ background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}

  /* disabled-summary modal */
  .seg button.on { background:var(--accent); color:#fff; }
  .sum-filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .sum-stat { font-size:11.5px; color:var(--muted); margin-bottom:8px; }
  table.sum-table thead th { position:sticky; top:0; background:#f8fafc; z-index:2; }
  table.sum-table td { vertical-align:middle; }
  table.sum-table td.c { white-space:nowrap; }
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>

<script>
"use strict";
/* ===================================================================
   Coverage Management — self-contained backoffice prototype.
   Pure vanilla JS · matches the reporting theme · runs via file://
   =================================================================== */

/* ----------------------------- RNG ----------------------------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
var rng = mulberry32(20260629);
function ri(lo,hi){return Math.floor(rng()*(hi-lo+1))+lo;}
function pick(arr){return arr[Math.floor(rng()*arr.length)];}
function chance(p){ return rng()<p; }

/* ----------------------------- Reference data ----------------------------- */
var PARTNERS = [
  {id:"acme",  name:"Acme Bet (BR)"},
  {id:"lucky", name:"LuckyStar (NG)"},
  {id:"europlay", name:"EuroPlay (DE)"},
  {id:"apex",  name:"Apex Sports (UK)"},
  {id:"monde", name:"BetMonde (FR)"},
  {id:"gold",  name:"GoldBet (IT)"}
];
var PROVIDERS = ["Betradar","BetGenius","LSports","OddsMatrix","TXOdds","Internal Trading","BetConstruct","Stats Perform"];
var AGE_GROUPS = ["Senior","U23","U21","U19","U17","Women","Youth","Amateur","Reserve"];

/* per-sport market catalogs (key + label) */
function mk(label){ return {key:label.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,""), label:label}; }
var MARKET_CATALOG = {

/* Build the coverage tree with rich per-node coverage attributes */
var NODES = {};      // id -> node
var ROOT_IDS = [];
var SEQ = 0;

function makeNode(type, name, parentId, sport){
  var id = "n"+(SEQ++);
  var node = {
    id:id, type:type, name:name, parentId:parentId, sport:sport,
    childIds:[],
    order: 0,
    live:    { enabled:true },
    prematch:{ enabled:true },
    // market overrides: marketKey -> {live:'on'|'off'|undefined, prematch:'on'|'off'|undefined}
    marketRules:{},
    // feed providers per partner: partnerId -> [providerName...] ordered by priority
    providers:{},
    template:null,     // applied template id (tournament/event); for sport: defined templates handled separately
    ageGroup:null      // tournaments
  };
  NODES[id]=node;
  if(parentId) NODES[parentId].childIds.push(id); else ROOT_IDS.push(id);
  return node;
}

(function build(){
  Object.keys(SPORT_TREE).forEach(function(sport, si){
    var sNode = makeNode("sport", sport, null, sport);
    sNode.order = si;
    // some sports disabled on one channel for variety
    if(sport==="Water Polo") sNode.live.enabled=false;
    if(sport==="Beach Volleyball") sNode.prematch.enabled=false;
    if(sport==="Futsal") { sNode.live.enabled=false; }
    // sport-level market disables (apply down): disable a couple obscure markets on live
    var smk = marketsFor(sport);
    if(smk.length>6){
      sNode.marketRules[smk[smk.length-1].key] = { live:'off' };       // last market off live everywhere
      if(chance(.5)) sNode.marketRules[smk[smk.length-2].key] = { live:'off', prematch:'off' };
    }
    // default provider priority for a few partners
    PARTNERS.forEach(function(p){
      if(chance(.7)){
        var provs = PROVIDERS.slice().sort(function(){return rng()-.5;}).slice(0, ri(2,4));
        sNode.providers[p.id]=provs;
      }
    });

    var cats = SPORT_TREE[sport];
    Object.keys(cats).forEach(function(cat, ci){
      var cNode = makeNode("category", cat, sNode.id, sport);
      cNode.order = ci;
      if(chance(.08)) cNode.live.enabled=false;
      cats[cat].forEach(function(trn, ti){
        var tNode = makeNode("tournament", trn, cNode.id, sport);
        tNode.order = ti;
        tNode.ageGroup = chance(.78) ? "Senior" : pick(AGE_GROUPS);
        if(chance(.10)) tNode.prematch.enabled=false;
        if(chance(.06)) tNode.live.enabled=false;
        // some tournaments get an applied template
        if(chance(.35)) tNode.template = "tmpl_"+sport.replace(/\W/g,"")+"_"+(chance(.5)?"core":"full");
        // tournament-level market disable + an exclusion example
        if(chance(.25)){
          var tm = marketsFor(sport);
          tNode.marketRules[tm[ri(1,Math.min(5,tm.length-1))].key] = { live:'off' };
        }
        // partner provider override on some tournaments
        PARTNERS.forEach(function(p){ if(chance(.18)){ tNode.providers[p.id]=PROVIDERS.slice().sort(function(){return rng()-.5;}).slice(0,ri(2,3)); } });

        var teams = TEAMS[sport]||TEAMS["Football"];
        var nEvents = ri(4,9);
        for(var e=0;e<nEvents;e++){
          var a=pick(teams), b=pick(teams); var guard=0; while(b===a && guard++<10) b=pick(teams);
          var indiv = ["Tennis","MMA","Boxing","Darts","Snooker","Table Tennis","Badminton","Golf","Formula 1","Cycling"].indexOf(sport)!==-1;
          var evName = (sport==="Formula 1"||sport==="Golf"||sport==="Cycling") ? (trn) : (a + (indiv?" v ":" vs ") + b);
          if(sport==="Formula 1") evName = pick(["Monaco","Silverstone","Monza","Spa","Suzuka","Austin","Bahrain","Singapore"]) + " GP";
          if(sport==="Golf") evName = trn + " — R"+ri(1,4);
          if(sport==="Cycling") evName = trn + " — Stage "+ri(1,21);
          var eNode = makeNode("event", evName, tNode.id, sport);
          eNode.order = e;
          eNode.date = isoPlus(BASE_DATE, ri(0,21));
          eNode.isLiveNow = chance(.16);
          if(chance(.07)) eNode.live.enabled=false;
          if(chance(.05)) eNode.prematch.enabled=false;
          // event-level market disable / exclusion-to-parent
          if(chance(.18)){
            var em = marketsFor(sport);
            eNode.marketRules[em[ri(0,em.length-1)].key] = { live:'off' };
          }
          // EXCLUSION example: re-enable a market the sport turned off
          if(smk.length>6 && chance(.15)){
            eNode.marketRules[smk[smk.length-1].key] = { live:'on' };  // override sport-off
          }
          // markets as leaf nodes
          marketsFor(sport).forEach(function(m, mi){
            var mNode = makeNode("market", m.label, eNode.id, sport);
            mNode.marketKey = m.key;
            mNode.order = mi;
          });
        }
      });
    });
  });
})();

/* ----------------------------- Helpers: hierarchy ----------------------------- */
function ancestors(node){ var out=[], p=node.parentId; while(p){ out.unshift(NODES[p]); p=NODES[p].parentId; } return out; }
function pathLabel(node){ return ancestors(node).map(function(n){return n.name;}).concat(node.name).join(" › "); }
function sportOf(node){ return node.sport; }
function siblings(node){ return (node.parentId? NODES[node.parentId].childIds : ROOT_IDS).map(function(id){return NODES[id];}); }
function sortedChildren(node){
  var ids = node ? node.childIds : ROOT_IDS;
  return ids.map(function(id){return NODES[id];}).sort(function(a,b){ return a.order-b.order || a.name.localeCompare(b.name); });
}

/* effective channel state: a node is effectively ON only if it and all ancestors are ON for that channel */
function effChannel(node, ch){
  if(!node[ch].enabled) return false;
  var p=node.parentId;
  while(p){ if(!NODES[p][ch].enabled) return false; p=NODES[p].parentId; }
  return true;
}
function ownChannel(node, ch){ return node[ch].enabled; }

/* effective market rule for a (node, marketKey, channel): walks up, deepest override wins.
   returns {state:'on'|'off', source:nodeId, excluded:bool} */
function effMarket(node, marketKey, ch){
  var chain = ancestors(node).concat(node); // root..node
  var result = {state:'on', source:null, excluded:false, parentOff:false};
  chain.forEach(function(n){
    var r = n.marketRules[marketKey];
    if(r && r[ch]){
      if(result.state==='off' && r[ch]==='on') result.excluded=true;  // re-enabled below an off
      result.state = r[ch];
      result.source = n.id;
    }
  });
  return result;
}

/* node coverage dot for sidebar: both on / partial / off across channels (own only) */
function nodeDot(node){
  var l=ownChannel(node,'live'), p=ownChannel(node,'prematch');
  if(l&&p) return "both"; if(!l&&!p) return "off"; return "partial";
}

/* count helpers for KPIs */
function countDisabledNodes(){
  var liveOff=0, preOff=0, mkOff=0;
  Object.keys(NODES).forEach(function(k){
    var n=NODES[k];
    if(n.type!=="market"){
      if(!n.live.enabled) liveOff++;
      if(!n.prematch.enabled) preOff++;
    }
    Object.keys(n.marketRules).forEach(function(mkk){
      var r=n.marketRules[mkk];
      if(r.live==='off'||r.prematch==='off') mkOff++;
    });
  });
  return {liveOff:liveOff, preOff:preOff, mkOff:mkOff};
}

/* ---------- main coverage table ---------- */
function visibleRows(){
  // produce flat list honoring expansion, search, age filter
  var rows=[];
  var q=state.search.trim().toLowerCase();
  function matchSearch(node){
    if(!q) return true;
    if(node.name.toLowerCase().indexOf(q)!==-1) return true;
    // match if any descendant matches
    return node.childIds.some(function(id){ return matchSearch(NODES[id]); });
  }
  function ageOk(node){
    if(!state.ageFilter) return true;
    // applies to tournament + its subtree; sports/categories pass through
    if(node.type==="tournament") return node.ageGroup===state.ageFilter;
    if(node.type==="event"||node.type==="market"){ // inherit tournament age
      var t=node; while(t && t.type!=="tournament") t=NODES[t.parentId];
      return t? t.ageGroup===state.ageFilter : true;
    }
    return true; // sport/category: shown if any descendant tournament matches (handled by recursion)
  }
  function walk(node, depth){
    if(!matchSearch(node)) return false;
    // age filter: for sport/category only include if some descendant tournament matches
    if(state.ageFilter && (node.type==="sport"||node.type==="category")){
      var any = hasAgeDescendant(node);
      if(!any) return false;
    }
    if(state.ageFilter && node.type==="tournament" && node.ageGroup!==state.ageFilter) return false;

    rows.push({node:node, depth:depth});
    var open = state.expanded.has(node.id) || (q && node.type!=="event"); // auto-open on search down to events
    if(open && node.childIds.length){
      sortedChildren(node).forEach(function(c){ walk(c, depth+1); });
    }
    return true;
  }
  sortedChildren(null).forEach(function(sp){ walk(sp,0); });
  return rows;
}
function hasAgeDescendant(node){
  if(node.type==="tournament") return node.ageGroup===state.ageFilter;
  return node.childIds.some(function(id){ return hasAgeDescendant(NODES[id]); });
}

function covRowHtml(node, depth, showLive, showPre){
  var hasKids = node.childIds.length>0;
  var open = state.expanded.has(node.id);
  var tag = {sport:"SPT",category:"CAT",tournament:"TRN",event:"EVT",market:"MKT"}[node.type];

  // channel toggles
  function chanCell(ch){
    if(node.type==="market"){
      // markets handled at parent level; show effective on/off summary instead
      return '<td><div class="cell sub-muted">—</div></td>';
    }
    var own = node[ch].enabled;
    var eff = effChannel(node, ch);
    var inheritedOff = own && !eff; // own on but ancestor off
    var cls = "sw "+(own?"on":"")+(inheritedOff?" inherited-off":"");
    var note = "";
    if(inheritedOff) note = '<span class="inh-note">parent off</span>';
    return '<td><div class="ch-cell">'
      + '<span class="'+cls+'" data-ch="'+ch+'" data-toggle="'+node.id+'" title="'+(own?'Disable':'Enable')+' '+ch+'"><span class="track"></span></span>'
      + note
    + '</div></td>';
  }

  // order control
  var sibs = siblings(node).slice().sort(function(a,b){return a.order-b.order;});
  var idx = sibs.indexOf(node);
  var orderCell = node.type==="market"
    ? '<td><div class="cell"><span class="sub-muted">'+(idx+1)+'</span></div></td>'
    : '<td><div class="cell"><div class="ord">'
        + '<button data-move="up" data-node="'+node.id+'" '+(idx<=0?'disabled':'')+'>▲</button>'
        + '<span class="num">'+(idx+1)+'</span>'
        + '<button data-move="down" data-node="'+node.id+'" '+(idx>=sibs.length-1?'disabled':'')+'>▼</button>'
      + '</div></div></td>';

  // providers (per partner)
  var provCell;
  if(node.type==="market"){ provCell='<td><div class="cell sub-muted">—</div></td>'; }
  else {
    var provs = node.providers[state.partner];
    if(provs && provs.length){
      provCell = '<td><div class="cell"><span class="pbadge" data-providers="'+node.id+'"><span class="prio">1</span>'+esc(provs[0])+(provs.length>1?(' +'+(provs.length-1)):'')+'</span></div></td>';
    } else {
      // inherited?
      var inh=null, p=node.parentId;
      while(p){ if(NODES[p].providers[state.partner]){ inh=NODES[p].providers[state.partner]; break;} p=NODES[p].parentId; }
      provCell = '<td><div class="cell"><span class="pbadge" data-providers="'+node.id+'" style="color:var(--muted)">'
        + (inh? '↑ '+esc(inh[0])+(inh.length>1?(' +'+(inh.length-1)):'') : '+ set')
        + '</span></div></td>';
    }
  }

  // markets / template cell
  var mktCell;
  if(node.type==="market"){
    // show effective live/prematch state for the leaf market
    var parentEv = NODES[node.parentId];
    var lv = effMarket(parentEv, node.marketKey, 'live');
    var pr = effMarket(parentEv, node.marketKey, 'prematch');
    var parts=[];
    if(showLive) parts.push('<span class="eff-badge '+(lv.excluded?'eff-exc':(lv.state==='on'?'eff-on':'eff-off'))+'">L '+(lv.excluded?'EXC':lv.state.toUpperCase())+'</span>');
    if(showPre) parts.push('<span class="eff-badge '+(pr.excluded?'eff-exc':(pr.state==='on'?'eff-on':'eff-off'))+'">P '+(pr.excluded?'EXC':pr.state.toUpperCase())+'</span>');
    mktCell = '<td><div class="cell"><div class="pillrow" style="justify-content:center">'+parts.join("")+'</div></div></td>';
  } else if(node.type==="event"||node.type==="tournament"){
    var tmplId = node.template;
    var tmpl = tmplId? TEMPLATES[tmplId] : null;
    var tmplBadge = '<span class="tmpl-badge '+(tmpl?'set':'none')+'" data-template="'+node.id+'">'+(tmpl? '◳ '+esc(tmpl.name.replace(sportOf(node)+" — ","")) : '◳ template')+'</span>';
    // count disabled markets at this node
    var nDis = Object.keys(node.marketRules).filter(function(k){var r=node.marketRules[k]; return r.live==='off'||r.prematch==='off';}).length;
    var nExc = Object.keys(node.marketRules).filter(function(k){return node.marketRules[k].live==='on'||node.marketRules[k].prematch==='on';}).length;
    var total = marketsFor(sportOf(node)).length;
    var mk = '<span class="mkt-link" data-markets="'+node.id+'">'+(nDis>0?'<span class="warnnum">'+nDis+'</span>':'0')+' / '+total+' off'+(nExc>0?' · '+nExc+' exc':'')+'</span>';
    mktCell = '<td><div class="cell"><div class="pillrow" style="justify-content:center">'+tmplBadge+mk+'</div></div></td>';
  } else {
    // sport/category: market rules + (sport: templates link)
    var nDis2 = Object.keys(node.marketRules).filter(function(k){var r=node.marketRules[k]; return r.live==='off'||r.prematch==='off';}).length;
    var total2 = marketsFor(sportOf(node)).length;
    var mk2 = '<span class="mkt-link" data-markets="'+node.id+'">'+(nDis2>0?'<span class="warnnum">'+nDis2+'</span>':'0')+' / '+total2+' off</span>';
    var tlink = node.type==="sport" ? ' <span class="tmpl-badge none" data-templates="'+node.id+'">◳ templates ('+templatesForSport(node.name).length+')</span>' : '';
    mktCell = '<td><div class="cell"><div class="pillrow" style="justify-content:center">'+mk2+tlink+'</div></div></td>';
  }

  // age cell (tournaments editable, events inherit)
  var ageCell;
  if(node.type==="tournament"){
    ageCell = '<td><div class="cell"><span class="age-badge" data-age="'+node.id+'">'+esc(node.ageGroup||"—")+'</span></div></td>';
  } else if(node.type==="event"){
    var t=NODES[node.parentId]; ageCell='<td><div class="cell sub-muted">'+esc(t.ageGroup||"—")+'</div></td>';
  } else ageCell='<td><div class="cell sub-muted">—</div></td>';

  // name cell
  var dimmed = (!effChannel(node,'live') && !effChannel(node,'prematch'));
  var selectable = node.type!=="market";
  var checked = state.selected.has(node.id);
  var liveBadge = (node.type==="event" && node.isLiveNow) ? ' <span class="live-pill">live now</span>' : '';
  var nameCell = '<td class="lbl"><div class="cell" style="padding-left:'+(10+depth*18)+'px">'
    + '<span class="twisty '+(hasKids?(open?'open':''):'leaf')+'" '+(hasKids?('data-tw="'+node.id+'"'):'')+'>'+CHEVRON+'</span>'
    + (selectable? '<input type="checkbox" class="cb-sel" data-sel="'+node.id+'"'+(checked?' checked':'')+'>' : '<span style="width:14px"></span>')
    + '<span class="dim-tag '+tag+'">'+tag+'</span>'
    + '<span class="name'+(dimmed?' dis':'')+'" title="'+esc(node.name)+'">'+esc(node.name)+'</span>'
    + (hasKids?'<span class="sub-muted">· '+node.childIds.length+'</span>':'')
    + liveBadge
  + '</div></td>';

  return '<tr>'
    + nameCell
    + (showLive? chanCell('live'):'')
    + (showPre? chanCell('prematch'):'')
    + orderCell
    + provCell
    + mktCell
    + ageCell
    + '<td><div class="cell"><button class="icon-btn" data-providers="'+node.id+'" title="Feed providers">⚙</button></div></td>'
  + '</tr>';
}

        + (applied? '<span class="eff-badge eff-on">APPLIED</span>' : '<button class="btn sm primary" data-apply-tmpl="'+t.id+'" data-apply-node="'+node.id+'">Apply</button>')
      + '</div>'
      + '<div class="tc-meta">'+esc(t.desc)+' · '+t.markets.length+' markets</div>'
      + '<div style="margin-top:6px">'+pills+'</div>'
    + '</div>';
  }).join("");

  var body = '<div class="info-banner blue">ℹ️ Templates are defined per sport and applied at tournament/event level — separately for live &amp; prematch. Margin settings are intentionally managed elsewhere to keep this UI focused on coverage.</div>'
    + '<div class="tabs"><button class="'+(state.modalTab===0?'on':'')+'" data-mtab="0">Live</button><button class="'+(state.modalTab===1?'on':'')+'" data-mtab="1">Prematch</button></div>'
    + cards
    + (node.template? '<button class="btn danger sm" data-clear-tmpl="'+node.id+'" style="margin-top:6px">Remove applied template</button>':'');

  return shell('Apply Market Template — '+esc(node.name),
    esc(node.type.toUpperCase())+' · '+esc(sport)+' · '+esc(pathLabel(node)),
    body, null, false) ;
}

/* --- age group assignment --- */
function ageModal(node){
  var body = '<div class="info-banner blue">ℹ️ Age groups classify tournaments (e.g. youth competitions). Assigned here, they become a filter for bulk enable/disable on the main grid.</div>'

    + '</div>';

/* --- disabled summary overlay (per partner) --- */
function collectDisabledIssues(){
  var out=[];
  Object.keys(NODES).forEach(function(k){
    var n=NODES[k];
    if(n.type!=="market" && (!n.live.enabled || !n.prematch.enabled)){
      var ch=[]; if(!n.live.enabled)ch.push("Live"); if(!n.prematch.enabled)ch.push("Prematch");
      out.push({kind:"node", node:n, type:n.type, sport:n.sport, name:n.name, path:pathLabel(n), channels:ch});
    }
    Object.keys(n.marketRules).forEach(function(mkk){
      var r=n.marketRules[mkk];
      var lbl=(marketsFor(sportOf(n)).filter(function(x){return x.key===mkk;})[0]||{label:mkk}).label;
      if(r.live==='off'||r.prematch==='off'){ var c=[]; if(r.live==='off')c.push("Live"); if(r.prematch==='off')c.push("Prematch"); out.push({kind:"market", node:n, type:n.type, sport:n.sport, name:lbl, path:pathLabel(n), channels:c}); }
      if(r.live==='on'||r.prematch==='on'){ var c2=[]; if(r.live==='on')c2.push("Live"); if(r.prematch==='on')c2.push("Prematch"); out.push({kind:"exclusion", node:n, type:n.type, sport:n.sport, name:lbl, path:pathLabel(n), channels:c2}); }
    });
  });
  return out;
}
function issuePassesExceptKind(it, f){
  if(f.sport && it.sport!==f.sport) return false;
  if(f.type && it.type!==f.type) return false;
  if(f.channel==="live" && it.channels.indexOf("Live")===-1) return false;
  if(f.channel==="prematch" && it.channels.indexOf("Prematch")===-1) return false;
  var q=(f.q||"").toLowerCase();
  if(q && it.name.toLowerCase().indexOf(q)===-1 && it.path.toLowerCase().indexOf(q)===-1) return false;
  return true;
}
function filterIssues(all, f){
  return all.filter(function(it){
    if(f.kind!=="all" && it.kind!==f.kind) return false;
    return issuePassesExceptKind(it, f);
  });
}
function csvCell(s){ s=String(s); return /[",\n]/.test(s)? '"'+s.replace(/"/g,'""')+'"' : s; }
function exportDisabledCSV(){
  var f=state.summaryFilters; var rows=filterIssues(collectDisabledIssues(), f);
  var head=["Kind","Level","Item","Channels","Location","Partner"];
  var lines=[head.join(",")].concat(rows.map(function(it){
    return [it.kind, it.type, it.name, it.channels.join("|"), it.path, partnerName(state.partner)].map(csvCell).join(",");
  }));
  var blob=new Blob([lines.join("\n")], {type:"text/csv"});
  var url=URL.createObjectURL(blob); var a=document.createElement("a");
  a.href=url; a.download="disabled-"+state.partner+".csv"; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 0);
}
function disabledSummaryModal(){
  var partner=state.partner;
  var f=state.summaryFilters;
  var all=collectDisabledIssues();

  // counts for the kind tabs honour all the OTHER active filters
  var baseForCounts=all.filter(function(it){ return issuePassesExceptKind(it,f); });
  var cnt={all:baseForCounts.length, node:0, market:0, exclusion:0};
  baseForCounts.forEach(function(it){ cnt[it.kind]++; });

  var rows=filterIssues(all, f);

  var sportsPresent=Object.keys(all.reduce(function(a,it){a[it.sport]=1;return a;},{})).sort();
  var sportOpts='<option value="">All sports</option>'+sportsPresent.map(function(s){ return '<option value="'+esc(s)+'"'+(f.sport===s?' selected':'')+'>'+esc(s)+'</option>'; }).join("");
  var typeOpts='<option value="">All levels</option>'+["sport","category","tournament","event"].map(function(tp){ return '<option value="'+tp+'"'+(f.type===tp?' selected':'')+'>'+tp.charAt(0).toUpperCase()+tp.slice(1)+'</option>'; }).join("");

  function kindTab(k,label){ return '<button data-sum-kind="'+k+'" class="'+(f.kind===k?'on':'')+'">'+label+' ('+cnt[k]+')</button>'; }
  function chTab(c,label){ return '<button data-sum-ch="'+c+'" class="'+(f.channel===c?'on':'')+'">'+label+'</button>'; }

  var tagMap={sport:"SPT",category:"CAT",tournament:"TRN",event:"EVT",market:"MKT"};
  function kindBadge(it){
    if(it.kind==='node') return '<span class="eff-badge eff-off">NODE OFF</span>';
    if(it.kind==='market') return '<span class="eff-badge eff-off">MARKET OFF</span>';
    return '<span class="eff-badge eff-exc">EXCLUSION</span>';
  }
  var CAP=300;
  var trs=rows.slice(0,CAP).map(function(it){
    var tag=tagMap[it.type]||"";
    var chs=it.channels.map(function(c){ return '<span class="eff-badge '+(it.kind==='exclusion'?'eff-exc':'eff-off')+'">'+c+'</span>'; }).join(" ");
    var nameCell='<b>'+esc(it.name)+'</b>'+(it.kind!=='node'?' <span class="sub-muted">@ '+esc(it.node.name)+'</span>':'');
    return '<tr><td>'+kindBadge(it)+'</td><td><span class="dim-tag '+tag+'">'+tag+'</span></td><td>'+nameCell+'</td><td class="c">'+chs+'</td><td class="ppath">'+esc(it.path)+'</td></tr>';
  }).join("");
  var tableBody = rows.length? trs : '<tr><td colspan="5"><div class="empty-state">No disabled items match these filters.</div></td></tr>';
  var moreNote = rows.length>CAP ? '<div class="sub-muted" style="padding:8px 2px">Showing first '+CAP+' of '+rows.length+' — narrow the filters to see the rest.</div>' : '';

  var filterBar='<div class="sum-filters">'
    + '<div class="seg">'+kindTab("all","All")+kindTab("node","Nodes")+kindTab("market","Markets")+kindTab("exclusion","Exclusions")+'</div>'
    + '<select class="input" id="sum-sport" style="min-width:150px">'+sportOpts+'</select>'
    + '<select class="input" id="sum-type" style="min-width:130px">'+typeOpts+'</select>'
    + '<div class="seg">'+chTab("both","Both")+chTab("live","Live")+chTab("prematch","Prematch")+'</div>'
    + '<input class="search-box" id="sum-search" placeholder="Search name or path…" value="'+esc(f.q)+'" style="flex:1; min-width:160px; max-width:none">'
  + '</div>';

  var active = (f.kind!=="all"||f.sport||f.type||f.channel!=="both"||f.q);
  var body = '<div class="info-banner">⚠️ Effective “what’s switched off” for <b>'+esc(partnerName(partner))+'</b>. Filter by kind, sport, level or channel to audit before going live.</div>'
    + filterBar
    + '<div class="sum-stat">Showing <b>'+rows.length+'</b> item'+(rows.length===1?'':'s')+' · '+cnt.node+' node'+(cnt.node===1?'':'s')+' off · '+cnt.market+' market rule'+(cnt.market===1?'':'s')+' · '+cnt.exclusion+' exclusion'+(cnt.exclusion===1?'':'s')+(active?' · <a href="#" id="sum-reset" style="color:var(--accent)">reset filters</a>':'')+'</div>'
    + '<table class="grid sum-table"><thead><tr><th style="width:118px">Kind</th><th style="width:48px">Lvl</th><th>Item</th><th class="c" style="width:130px">Channels</th><th>Location</th></tr></thead><tbody>'+tableBody+'</tbody></table>'
    + moreNote;

  return shell('What’s Disabled — '+esc(partnerName(partner)), 'Effective coverage audit · live + prematch', body,
    '<button class="btn" id="sum-export">⤓ Export CSV</button><span class="spacer"></span><button class="btn primary" id="modal-close">Close</button>', true);
}

/* --- picker modal (add picked tournaments/events) --- */
function pickerModal(type, title, pickedArr, kind){
  var q=(state.modal.q||"").toLowerCase();
  var pool = allOfType(type).filter(function(n){
    if(pickedArr.indexOf(n.id)!==-1) return false;
    if(!q) return true;
    return n.name.toLowerCase().indexOf(q)!==-1 || pathLabel(n).toLowerCase().indexOf(q)!==-1;
  }).slice(0,80);
  var rows = pool.map(function(n){
    return '<div class="checkline"><input type="checkbox" data-pick="'+n.id+'" data-pick-kind="'+kind+'"><div><b>'+esc(n.name)+'</b>'+(n.date?' <span class="sub-muted">· '+fmtWhen(n.date)+'</span>':'')+'<div class="sub-muted">'+esc(pathLabel(NODES[n.parentId]))+'</div></div></div>';
  }).join("") || '<div class="sub-muted">No matches.</div>';
  var body = '<input class="search-box" id="picker-search" placeholder="Search '+type+'s…" value="'+esc(state.modal.q||"")+'" style="width:100%; max-width:none; margin-bottom:12px">'
    + '<div style="max-height:46vh; overflow:auto">'+rows+'</div>';
  return shell(title, 'Tick items to add — they will surface in the iframe left tree', body,
    '<span class="sub-muted spacer">Showing first 80 matches</span><button class="btn" id="modal-close">Done</button>', false);
}

/* ============================================================
   EVENTS
   ============================================================ */
var root=document.getElementById("root");
var modalRoot=document.getElementById("modal-root");

function reorder(node, dir){
  var sibs = siblings(node).slice().sort(function(a,b){return a.order-b.order;});
  var i=sibs.indexOf(node), j=dir==="up"?i-1:i+1;
  if(j<0||j>=sibs.length) return;
  var a=sibs[i], b=sibs[j]; var t=a.order; a.order=b.order; b.order=t;
  // normalize if equal
  sibs.sort(function(x,y){return x.order-y.order;}).forEach(function(n,k){ n.order=k; });
}

function setChannelCascade(node, ch, val){
  node[ch].enabled=val;
  // cascade to descendants (set own flag so toggling parent back on restores)
  (function walk(n){ n.childIds.forEach(function(id){ var c=NODES[id]; if(c.type!=="market"){ c[ch].enabled=val; walk(c);} }); })(node);
}

root.addEventListener("click", function(e){
  var t=e.target;

  // view switch
  var nv=t.closest("[data-view]"); if(nv){ state.view=nv.getAttribute("data-view"); render(); return; }

  // sidebar twisty / select
  var stw=t.closest("[data-side-tw]"); if(stw){ var id=stw.getAttribute("data-side-tw"); if(state.expanded.has(id))state.expanded.delete(id); else state.expanded.add(id); render(); return; }
  var srow=t.closest("[data-side]"); if(srow){ var sid=srow.getAttribute("data-side"); state.view="coverage"; expandToNode(NODES[sid]); state.modal=null; render(); scrollToNode(sid); return; }

  // jump from picks
  var jt=t.closest("[data-jump]"); if(jt){ state.view="coverage"; expandToNode(NODES[jt.getAttribute("data-jump")]); render(); scrollToNode(jt.getAttribute("data-jump")); return; }
  var je=t.closest("[data-jump-event]"); if(je){ state.view="coverage"; expandToNode(NODES[je.getAttribute("data-jump-event")]); render(); scrollToNode(je.getAttribute("data-jump-event")); return; }

  var upt=t.closest("[data-unpin-trn]"); if(upt){ var pid=upt.getAttribute("data-unpin-trn"); PICKED_TOURNAMENTS=PICKED_TOURNAMENTS.filter(function(x){return x!==pid;}); render(); return; }
  var upe=t.closest("[data-unpin-event]"); if(upe){ var eid=upe.getAttribute("data-unpin-event"); PICKED_EVENTS=PICKED_EVENTS.filter(function(x){return x!==eid;}); render(); return; }
  if(t.closest("#add-picked-trn")){ state.modal={type:"add-picked-trn",q:""}; render(); return; }
  if(t.closest("#add-picked-event")){ state.modal={type:"add-picked-event",q:""}; render(); return; }

  // main tree twisty
  var tw=t.closest("[data-tw]"); if(tw){ var p=tw.getAttribute("data-tw"); if(state.expanded.has(p))state.expanded.delete(p); else state.expanded.add(p); render(); return; }

  // channel toggle
  var sw=t.closest("[data-toggle]"); if(sw){ var nid=sw.getAttribute("data-toggle"); var ch=sw.getAttribute("data-ch"); var n=NODES[nid]; setChannelCascade(n,ch,!n[ch].enabled); render(); return; }

  // order
  var mv=t.closest("[data-move]"); if(mv){ reorder(NODES[mv.getAttribute("data-node")], mv.getAttribute("data-move")); render(); return; }

  // selection checkbox handled in change; bulk buttons:
  var bulk=t.closest("[data-bulk]"); if(bulk){ doBulk(bulk.getAttribute("data-bulk")); return; }
  if(t.closest("#bulk-clear")){ state.selected=new Set(); render(); return; }

  // open modals
  var pv=t.closest("[data-providers]"); if(pv){ state.modal={type:"providers",nodeId:pv.getAttribute("data-providers")}; render(); return; }
  var mkb=t.closest("[data-markets]"); if(mkb){ state.modal={type:"markets",nodeId:mkb.getAttribute("data-markets")}; render(); return; }
  var tmb=t.closest("[data-template]"); if(tmb){ state.modalTab=0; state.modal={type:"template",nodeId:tmb.getAttribute("data-template")}; render(); return; }
  var tmpls=t.closest("[data-templates]"); if(tmpls){ state.modal={type:"templates",nodeId:tmpls.getAttribute("data-templates")}; render(); return; }
  var ageb=t.closest("[data-age]"); if(ageb){ state.modal={type:"age",nodeId:ageb.getAttribute("data-age")}; render(); return; }
  if(t.closest("#open-disabled-summary")){ state.summaryFilters={q:"",kind:"all",sport:"",type:"",channel:"both"}; state.modal={type:"disabled-summary"}; render(); return; }

  // toolbar
  if(t.closest("#expand-all")){ Object.keys(NODES).forEach(function(k){ if(NODES[k].childIds.length && NODES[k].type!=="event") state.expanded.add(k); }); render(); return; }
  if(t.closest("#collapse-all")){ state.expanded=new Set(); render(); return; }
});

function expandToNode(node){ ancestors(node).forEach(function(a){ state.expanded.add(a.id); }); if(node.childIds.length) state.expanded.add(node.id); }
function scrollToNode(id){ /* best-effort: no-op in prototype (rows are re-rendered) */ }

function doBulk(action){
  var ch = action.indexOf("live")!==-1?"live":"prematch";
  var val = action.indexOf("enable")===0;
  state.selected.forEach(function(id){ var n=NODES[id]; if(n) setChannelCascade(n,ch,val); });
  render();
}

root.addEventListener("change", function(e){
  if(e.target.id==="partner-sel"){ state.partner=e.target.value; render(); return; }
  if(e.target.id==="age-filter"){ state.ageFilter=e.target.value; render(); return; }
  var cb=e.target.closest("[data-sel]"); if(cb){ var id=cb.getAttribute("data-sel"); if(cb.checked)state.selected.add(id); else state.selected.delete(id); render(); return; }
});

root.addEventListener("input", function(e){
  if(e.target.id==="cov-search"){ state.search=e.target.value; render(); return; }
});

/* mode segmented control */
root.addEventListener("click", function(e){
  var seg=e.target.closest("[data-mode]"); if(seg){ state.mode=seg.getAttribute("data-mode"); render(); }
});

/* ----- modal events ----- */
modalRoot.addEventListener("click", function(e){
  var t=e.target;
  if(t.id==="overlay" || t.id==="modal-close" || t.id==="modal-close2"){ state.modal=null; render(); return; }

  // disabled-summary filters
  var sk=t.closest("[data-sum-kind]"); if(sk){ state.summaryFilters.kind=sk.getAttribute("data-sum-kind"); render(); return; }
  var sc=t.closest("[data-sum-ch]"); if(sc){ state.summaryFilters.channel=sc.getAttribute("data-sum-ch"); render(); return; }
  if(t.id==="sum-reset"){ e.preventDefault(); state.summaryFilters={q:"",kind:"all",sport:"",type:"",channel:"both"}; render(); return; }
  if(t.id==="sum-export"){ exportDisabledCSV(); return; }

  // providers
  var pu=t.closest("[data-prov-up]"); if(pu){ provMove(parseInt(pu.getAttribute("data-prov-up"),10),-1); return; }
  var pd=t.closest("[data-prov-down]"); if(pd){ provMove(parseInt(pd.getAttribute("data-prov-down"),10),1); return; }
  var px=t.closest("[data-prov-del]"); if(px){ provDel(parseInt(px.getAttribute("data-prov-del"),10)); return; }
  if(t.id==="prov-add-btn"){ provAdd(); return; }

  // market rules
  var mr=t.closest("[data-mr]"); if(mr){
    var n=NODES[state.modal.nodeId]; var key=mr.getAttribute("data-mr"); var ch=mr.getAttribute("data-mrch"); var val=mr.getAttribute("data-mrval");
    if(!n.marketRules[key]) n.marketRules[key]={};
    if(val==="inherit") delete n.marketRules[key][ch]; else n.marketRules[key][ch]=val;
    if(Object.keys(n.marketRules[key]).length===0) delete n.marketRules[key];
    render(); return;
  }

  // template
  var mtab=t.closest("[data-mtab]"); if(mtab){ state.modalTab=parseInt(mtab.getAttribute("data-mtab"),10); render(); return; }
  var ap=t.closest("[data-apply-tmpl]"); if(ap){ NODES[ap.getAttribute("data-apply-node")].template=ap.getAttribute("data-apply-tmpl"); render(); return; }
  var ct=t.closest("[data-clear-tmpl]"); if(ct){ NODES[ct.getAttribute("data-clear-tmpl")].template=null; render(); return; }

  // age
  var sa=t.closest("[data-set-age]"); if(sa){ NODES[sa.getAttribute("data-age-node")].ageGroup=sa.getAttribute("data-set-age"); render(); return; }
});
modalRoot.addEventListener("input", function(e){
  if(e.target.id==="picker-search"){ state.modal.q=e.target.value; render(); var el=document.getElementById("picker-search"); if(el){el.focus(); var v=el.value; el.setSelectionRange(v.length,v.length);} return; }
  if(e.target.id==="sum-search"){ state.summaryFilters.q=e.target.value; render(); return; }
});
modalRoot.addEventListener("change", function(e){
  if(e.target.id==="sum-sport"){ state.summaryFilters.sport=e.target.value; render(); return; }
  if(e.target.id==="sum-type"){ state.summaryFilters.type=e.target.value; render(); return; }
  var pk=e.target.closest("[data-pick]"); if(pk){
    var id=pk.getAttribute("data-pick"); var kind=pk.getAttribute("data-pick-kind");
    if(pk.checked){ if(kind==="trn"&&PICKED_TOURNAMENTS.indexOf(id)===-1)PICKED_TOURNAMENTS.push(id); if(kind==="event"&&PICKED_EVENTS.indexOf(id)===-1)PICKED_EVENTS.push(id); }
    render(); return;
  }
});
function provMove(i,d){ var n=NODES[state.modal.nodeId]; var arr=(n.providers[state.partner]||[]).slice(); var j=i+d; if(j<0||j>=arr.length)return; var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp; n.providers[state.partner]=arr; render(); }
function provDel(i){ var n=NODES[state.modal.nodeId]; var arr=(n.providers[state.partner]||[]).slice(); arr.splice(i,1); n.providers[state.partner]=arr; render(); }
function provAdd(){ var sel=document.getElementById("prov-add-sel"); if(!sel||!sel.value)return; var n=NODES[state.modal.nodeId]; var arr=(n.providers[state.partner]||[]).slice(); arr.push(sel.value); n.providers[state.partner]=arr; render(); }

document.addEventListener("keydown", function(e){ if(e.key==="Escape" && state.modal){ state.modal=null; render(); } });

render();
</script>
